name: Production Release

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/production-release.yml"
  workflow_dispatch:

concurrency:
  group: production-release
  cancel-in-progress: false

env:
  RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
  RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
  RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
  RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
  BACKEND_BASE_URL: ${{ vars.BACKEND_BASE_URL }}
  VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changed.outputs.backend }}
      frontend: ${{ steps.changed.outputs.frontend }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed release surfaces
        id: changed
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backend=true" >>"${GITHUB_OUTPUT}"
            echo "frontend=true" >>"${GITHUB_OUTPUT}"
            exit 0
          fi

          base="${{ github.event.before }}"
          if [ -z "${base}" ] || [ "${base}" = "0000000000000000000000000000000000000000" ]; then
            base="HEAD^"
          fi

          git diff --name-only "${base}" "${GITHUB_SHA}" > /tmp/changed-files.txt

          if grep -q '^backend/' /tmp/changed-files.txt; then
            echo "backend=true" >>"${GITHUB_OUTPUT}"
          else
            echo "backend=false" >>"${GITHUB_OUTPUT}"
          fi

          if grep -q '^frontend/' /tmp/changed-files.txt; then
            echo "frontend=true" >>"${GITHUB_OUTPUT}"
          else
            echo "frontend=false" >>"${GITHUB_OUTPUT}"
          fi

  validate:
    name: Validate Build
    runs-on: ubuntu-latest
    needs: detect-changes

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest

      - name: Run backend tests
        working-directory: backend
        env:
          PYTHONPATH: .
        run: python -m pytest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Type-check frontend
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deploy-backend:
    name: Deploy Backend and Migrate
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - validate
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.backend == 'true'
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python for Alembic
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies for Alembic
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy Railway backend
        if: >-
          ${{
            github.event_name == 'workflow_dispatch' ||
            needs.detect-changes.outputs.backend == 'true'
          }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway deployment redeploy \
            --service "${RAILWAY_SERVICE_NAME}" \
            --from-source \
            --yes

          for attempt in $(seq 1 90); do
            railway deployment list \
              --service "${RAILWAY_SERVICE_NAME}" \
              --json > /tmp/railway-deployments.json

            status="$(
              jq -r --arg sha "${GITHUB_SHA}" \
                'map(select(.meta.commitHash == $sha))[0].status // "PENDING"' \
                /tmp/railway-deployments.json
            )"

            echo "Railway deployment status for ${GITHUB_SHA}: ${status}"

            case "${status}" in
              SUCCESS|SKIPPED)
                exit 0
                ;;
              FAILED|CRASHED|REMOVED)
                echo "Railway deployment ended with status ${status}."
                cat /tmp/railway-deployments.json
                exit 1
                ;;
            esac

            sleep 10
          done

          echo "Timed out waiting for Railway deployment for ${GITHUB_SHA}."
          cat /tmp/railway-deployments.json
          exit 1

      - name: Run production migrations
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run \
            --service "${RAILWAY_SERVICE_NAME}" \
            --no-local \
            -- bash -lc './scripts/alembic-upgrade-head.sh'

      - name: Smoke test backend
        run: |
          set -euo pipefail

          curl -fsS "${BACKEND_BASE_URL}/health" >/dev/null
          curl -fsS "${BACKEND_BASE_URL}/openapi.json" -o /tmp/openapi.json

          python - <<'PY'
          import json
          from pathlib import Path

          paths = json.loads(Path("/tmp/openapi.json").read_text())["paths"]
          required = [
              "/misokinesia/dashboard",
              "/misokinesia/video-scores",
          ]
          missing = [path for path in required if path not in paths]
          if missing:
              raise SystemExit(f"Missing OpenAPI paths: {', '.join(missing)}")
          PY

          for path in /misokinesia/dashboard /misokinesia/video-scores; do
            status="$(
              curl -sS -o /tmp/backend-smoke-response.txt \
                -w "%{http_code}" \
                "${BACKEND_BASE_URL}${path}"
            )"
            if [ "${status}" != "401" ]; then
              echo "Expected ${path} to return 401 without auth, got ${status}"
              cat /tmp/backend-smoke-response.txt
              exit 1
            fi
          done

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - validate
      - deploy-backend
    if: >-
      ${{
        always() &&
        needs.validate.result == 'success' &&
        (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
        (github.event_name == 'workflow_dispatch' || needs.detect-changes.outputs.frontend == 'true')
      }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel

      - name: Link Vercel project
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<JSON
          {"orgId":"${VERCEL_ORG_ID}","projectId":"${VERCEL_PROJECT_ID}"}
          JSON

      - name: Pull Vercel production environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel pull --yes --environment=production --token "${VERCEL_TOKEN}"

      - name: Build Vercel output
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build --prod --token "${VERCEL_TOKEN}"

      - name: Deploy Vercel production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt --prod --token "${VERCEL_TOKEN}"
